<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBSB — Legal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --ink: #111110;
        --ink-2: #444441;
        --ink-3: #888885;
        --paper: #f5f4ef;
        --accent: #c84b2f;
        --border: #ddddd8;
      }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: 'DM Sans', system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }

      .logo {
        font-family: 'DM Serif Display', Georgia, serif;
        font-size: 2.5rem;
        letter-spacing: -0.04em;
        margin-bottom: 0.5rem;
      }

      .logo span { color: var(--accent); }

      .tagline {
        font-size: 0.9rem;
        color: var(--ink-3);
        margin-bottom: 3rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .cards {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .card {
        display: block;
        background: white;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1.75rem 2rem;
        text-decoration: none;
        color: var(--ink);
        width: 200px;
        transition: box-shadow 0.15s, transform 0.15s;
      }

      .card:hover {
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        transform: translateY(-2px);
      }

      .card-icon {
        font-size: 1.75rem;
        margin-bottom: 0.75rem;
      }

      .card-title {
        font-family: 'DM Serif Display', Georgia, serif;
        font-size: 1.05rem;
        margin-bottom: 0.4rem;
        letter-spacing: -0.01em;
      }

      .card-desc {
        font-size: 0.8rem;
        color: var(--ink-3);
        line-height: 1.5;
      }

      footer {
        position: fixed;
        bottom: 1.5rem;
        font-size: 0.78rem;
        color: var(--ink-3);
      }
    </style>
  </head>
  <body>
    <div class="logo">OBS<span>B</span></div>
    <div class="tagline">Chrome Extension · Legal Documents</div>

    <div class="cards">
      <a class="card" href="privacy.html">
        <div class="card-icon">🔒</div>
        <div class="card-title">Privacy Policy</div>
        <div class="card-desc">How we handle your data</div>
      </a>
      <a class="card" href="terms.html">
        <div class="card-icon">📄</div>
        <div class="card-title">Terms &amp; Conditions</div>
        <div class="card-desc">Rules for using OBSB</div>
      </a>
    </div>

    <footer>© 2026 OBSB</footer>
  </body>
</html>
